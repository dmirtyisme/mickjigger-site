<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mick Jigger — macOS mouse jiggler</title>
<meta name="description" content="Mick Jigger keeps your Mac awake. A tiny menu bar app.">
<style>
  :root {
    --bg: #07080A;
    --blue: #2B5BFF;
    --blue-soft: rgba(43, 91, 255, 0.14);
    --text: #F2F2F2;
    --gray: rgba(255, 255, 255, 0.45);
    --gray-dim: rgba(255, 255, 255, 0.28);
    --glass: rgba(20, 20, 22, 0.85);
    --glass-strong: rgba(28, 28, 30, 0.96);
    --border: rgba(255, 255, 255, 0.08);
    --menubar-bg: rgba(15, 15, 17, 0.72);
    --dock-bg: rgba(255, 255, 255, 0.12);
    --dock-border: rgba(255, 255, 255, 0.2);
    --hover: rgba(255, 255, 255, 0.09);
    --row-bg: rgba(255, 255, 255, 0.04);
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  [data-theme="light"] {
    --bg: #E8E8ED;
    --blue: #0040FF;
    --blue-soft: rgba(0, 64, 255, 0.1);
    --text: #1D1D1F;
    --gray: rgba(0, 0, 0, 0.5);
    --gray-dim: rgba(0, 0, 0, 0.32);
    --glass: rgba(255, 255, 255, 0.7);
    --glass-strong: rgba(245, 245, 247, 0.97);
    --border: rgba(0, 0, 0, 0.1);
    --menubar-bg: rgba(236, 236, 240, 0.85);
    --dock-bg: rgba(255, 255, 255, 0.45);
    --dock-border: rgba(0, 0, 0, 0.12);
    --hover: rgba(0, 0, 0, 0.07);
    --row-bg: rgba(0, 0, 0, 0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--font);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    cursor: none;
    transition: background 0.4s ease, color 0.4s ease;
  }

  a, button { cursor: none; }

  /* ---------- Ambient background ---------- */
  .ambient {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(1200px 700px at 50% 120%, rgba(43, 91, 255, 0.10), transparent 60%),
      radial-gradient(900px 500px at 80% -10%, rgba(43, 91, 255, 0.05), transparent 55%);
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  [data-theme="light"] .ambient {
    background:
      radial-gradient(1200px 700px at 50% 120%, rgba(0, 64, 255, 0.07), transparent 60%),
      radial-gradient(900px 500px at 80% -10%, rgba(0, 64, 255, 0.04), transparent 55%);
  }

  /* ---------- Trail canvas ---------- */
  #trail {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: block;
  }

  /* ---------- Custom cursor ---------- */
  #cursor {
    position: fixed;
    left: 0; top: 0;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 12px rgba(43, 91, 255, 0.9), 0 0 32px rgba(43, 91, 255, 0.35);
    z-index: 2000;
    pointer-events: none;
    transform: translate(-100px, -100px);
    transition: width .15s ease, height .15s ease, margin .15s ease, opacity .3s ease;
    opacity: 0;
  }
  #cursor.on { opacity: 1; }
  #cursor.hover {
    width: 20px; height: 20px;
    margin: -6px 0 0 -6px;
    background: rgba(43, 91, 255, 0.35);
    box-shadow: 0 0 16px rgba(43, 91, 255, 0.6);
  }

  /* ---------- MJ app tile (shared) ---------- */
  .mj-tile {
    background: linear-gradient(160deg, #4C77FF 0%, #2B5BFF 50%, #1B3FC4 100%);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mj-tile span {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-weight: 700;
    color: #fff;
    letter-spacing: -1px;
  }

  /* ---------- Menu bar ---------- */
  .menubar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 28px;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    background: var(--menubar-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    user-select: none;
    transform: translateY(-28px);
    opacity: 0;
    transition: transform .45s cubic-bezier(0.22, 1, 0.36, 1), opacity .45s ease,
                background 0.4s ease, border-color 0.4s ease;
  }
  .menubar.in { transform: translateY(0); opacity: 1; }
  .menubar .left, .menubar .right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .mb-item {
    display: flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 5px;
    color: var(--text);
    border: 0;
    background: transparent;
    font-family: var(--font);
    font-size: 13px;
    transition: background .12s ease, color 0.4s ease;
    white-space: nowrap;
  }
  button.mb-item:hover { background: var(--hover); }
  .mb-item.app-name { font-weight: 700; }

  /* MJ menu bar icon — miniature app tile */
  #mjMenuIcon { padding: 3px 6px; }
  #mjMenuIcon .mj-tile {
    width: 20px; height: 20px;
    border-radius: 5px;
  }
  #mjMenuIcon .mj-tile span { font-size: 10px; letter-spacing: -0.5px; }
  #mjMenuIcon.open { background: var(--hover); }
  #mjMenuIcon.pulse .mj-tile {
    animation: mjPulse 1.6s ease-in-out infinite;
  }
  @keyframes mjPulse {
    0%, 100% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 0 0 0 rgba(43, 91, 255, 0.6); }
    50%      { box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 0 14px 4px rgba(43, 91, 255, 0.75); }
  }

  #themeToggle { font-size: 13px; }
  #clock { font-variant-numeric: tabular-nums; }

  /* ---------- Language switcher (macOS input source style) ---------- */
  .lang-wrap { position: relative; }
  #langBtn { gap: 5px; font-weight: 600; font-size: 12px; }
  #langBtn .flag { font-size: 13px; }
  #langBtn.open { background: var(--hover); }
  .lang-menu {
    position: absolute;
    top: calc(100% + 7px);
    right: 0;
    min-width: 170px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    padding: 5px;
    opacity: 0;
    transform: translateY(-6px) scale(0.98);
    transform-origin: top right;
    pointer-events: none;
    transition: opacity .18s ease, transform .18s cubic-bezier(0.22, 1, 0.36, 1),
                background 0.4s ease, border-color 0.4s ease;
  }
  .lang-menu.open { opacity: 1; transform: none; pointer-events: auto; }
  .lang-menu button {
    display: flex;
    align-items: center;
    gap: 9px;
    width: 100%;
    border: 0;
    background: transparent;
    font-family: var(--font);
    font-size: 13px;
    color: var(--text);
    padding: 7px 10px;
    border-radius: 7px;
    text-align: left;
    transition: background .12s ease;
  }
  .lang-menu button:hover { background: var(--blue); color: #fff; }
  .lang-menu button .check { margin-left: auto; opacity: 0; font-size: 11px; }
  .lang-menu button.active .check { opacity: 1; }

  /* ---------- Dock ---------- */
  .dock-wrap {
    position: fixed;
    bottom: 12px;
    left: 0; right: 0;
    z-index: 60;
    display: flex;
    justify-content: center;
    pointer-events: none;
    transform: translateY(90px);
    opacity: 0;
    transition: transform .45s cubic-bezier(0.22, 1, 0.36, 1), opacity .45s ease;
  }
  .dock-wrap.in { transform: translateY(0); opacity: 1; }
  .dock {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--dock-bg);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border: 0.5px solid var(--dock-border);
    border-radius: 24px;
    pointer-events: auto;
    transition: background 0.4s ease, border-color 0.4s ease;
  }
  .dock-item {
    width: 56px; height: 56px;
    flex: 0 0 56px;
    position: relative;
    border: 0;
    background: transparent;
    padding: 0;
  }
  .dock-item .tile {
    width: 100%; height: 100%;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .dock-item .tile.mj { border-radius: 14px; }
  .dock-item .tile.mj span { font-size: 24px; }
  .dock-item .tile.notes {
    background: linear-gradient(180deg, #FDFBF3 0%, #F5EFD8 100%);
    font-size: 28px;
  }
  .dock-item .tile.github { background: #16181C; border: 1px solid rgba(255,255,255,0.1); }
  .dock-item .tile.github svg { width: 32px; height: 32px; fill: #F2F2F2; }
  .dock-item .tile.folder { background: transparent; }
  .dock-item .tile.folder svg { width: 52px; height: 44px; }

  .dock-item::after {
    content: "";
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gray);
    opacity: 0;
    transition: opacity .2s ease;
  }
  .dock-item.running::after { opacity: 1; }

  .dock-item .label {
    position: absolute;
    bottom: calc(100% + 14px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 7px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity .15s ease, transform .15s ease;
  }
  .dock-item:hover .label { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- Boot animation ---------- */
  #bootIcon {
    position: fixed;
    bottom: 22px;
    left: 50%;
    margin-left: -28px;
    width: 56px; height: 56px;
    border-radius: 14px;
    z-index: 70;
    animation: bootBounce .4s ease-in-out 3;
    transition: opacity .35s ease;
    pointer-events: none;
  }
  #bootIcon span { font-size: 24px; }
  #bootIcon.gone { opacity: 0; }
  @keyframes bootBounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-38px); }
  }

  /* ---------- Popover ---------- */
  .popover {
    position: fixed;
    top: 34px;
    right: 10px;
    z-index: 80;
    width: 300px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    padding: 16px;
    opacity: 0;
    transform: translateY(-8px) scale(0.98);
    transform-origin: top right;
    pointer-events: none;
    transition: opacity .2s ease, transform .2s cubic-bezier(0.22, 1, 0.36, 1),
                background 0.4s ease, border-color 0.4s ease;
  }
  .popover.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }
  .pop-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .pop-head .title { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .badge {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.12em;
    color: var(--blue);
    background: var(--blue-soft);
    border: 1px solid rgba(43, 91, 255, 0.35);
    border-radius: 5px;
    padding: 2px 6px;
  }
  .pop-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--row-bg);
    border: 1px solid var(--border);
    border-radius: 11px;
    margin-bottom: 10px;
    transition: background 0.4s ease, border-color 0.4s ease;
  }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gray-dim);
    transition: background .25s ease, box-shadow .25s ease;
  }
  .status-dot.on {
    background: #30D158;
    box-shadow: 0 0 10px rgba(48, 209, 88, 0.7);
  }

  .switch {
    position: relative;
    width: 42px; height: 25px;
    border-radius: 999px;
    background: var(--gray-dim);
    border: 0;
    padding: 0;
    transition: background .25s ease;
  }
  .switch::after {
    content: "";
    position: absolute;
    top: 2px; left: 2px;
    width: 21px; height: 21px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
    transition: transform .25s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .switch.on { background: #30D158; }
  .switch.on::after { transform: translateX(17px); }

  .pop-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gray-dim);
    margin: 12px 2px 7px;
  }
  .segmented {
    display: flex;
    background: var(--row-bg);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 2px;
    gap: 2px;
    transition: background 0.4s ease, border-color 0.4s ease;
  }
  .segmented button {
    flex: 1;
    border: 0;
    background: transparent;
    color: var(--gray);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 0;
    border-radius: 7px;
    transition: background .15s ease, color .15s ease;
  }
  .segmented button.active {
    background: var(--blue);
    color: #fff;
    box-shadow: 0 2px 10px rgba(43, 91, 255, 0.4);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }
  .stat {
    background: var(--row-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 6px;
    text-align: center;
    transition: background 0.4s ease, border-color 0.4s ease;
  }
  .stat .v {
    font-size: 15px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .stat .k {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray-dim);
    margin-top: 2px;
  }
  .pop-foot {
    margin-top: 13px;
    font-size: 11px;
    line-height: 1.45;
    color: var(--gray-dim);
    text-align: center;
  }

  /* ---------- Trail Score widget (draggable) ---------- */
  .widget {
    position: fixed;
    right: 22px;
    bottom: 110px;
    z-index: 900;
    width: 168px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 16px 14px;
    text-align: center;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .5s ease, transform .5s cubic-bezier(0.22, 1, 0.36, 1),
                background 0.4s ease, border-color 0.4s ease;
    pointer-events: none;
    user-select: none;
    touch-action: none;
  }
  .widget.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .widget.dragging { transition: background 0.4s ease, border-color 0.4s ease; }
  .widget .grip {
    width: 36px; height: 4px;
    border-radius: 999px;
    background: var(--gray-dim);
    margin: 0 auto 9px;
  }
  .widget-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--blue);
  }
  .widget-score {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.15;
    font-variant-numeric: tabular-nums;
  }
  .widget-meters {
    font-size: 12px;
    color: var(--gray);
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Idle mode ---------- */
  .idle-hint {
    position: fixed;
    top: 44px;
    left: 50%;
    transform: translate(-50%, -8px);
    z-index: 120;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 9px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity .6s ease, transform .6s cubic-bezier(0.22, 1, 0.36, 1),
                background 0.4s ease, border-color 0.4s ease;
  }
  .idle-hint .mj-word { color: var(--blue); font-weight: 700; }
  body.idle .idle-hint { opacity: 1; transform: translate(-50%, 0); }

  #synthCursor {
    position: fixed;
    top: 0; left: 0;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 14px rgba(43, 91, 255, 0.95), 0 0 40px rgba(43, 91, 255, 0.4);
    z-index: 110;
    pointer-events: none;
    opacity: 0;
    transition: opacity .8s ease;
  }
  body.idle #synthCursor { opacity: 1; animation: drift 16s ease-in-out infinite; }
  @keyframes drift {
    0%   { transform: translate(12vw, 68vh); }
    20%  { transform: translate(34vw, 30vh); }
    40%  { transform: translate(66vw, 52vh); }
    60%  { transform: translate(84vw, 24vh); }
    80%  { transform: translate(48vw, 74vh); }
    100% { transform: translate(12vw, 68vh); }
  }

  /* ---------- Folder stack ---------- */
  .stack {
    position: fixed;
    bottom: 92px;
    left: 50%;
    z-index: 90;
    pointer-events: none;
  }
  .stack .card {
    position: absolute;
    bottom: 0;
    left: -80px;
    width: 160px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 13px;
    box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
    padding: 12px 14px;
    text-align: left;
    font-family: var(--font);
    opacity: 0;
    transform: translateY(24px) scale(0.9);
    transition: opacity .28s ease, transform .32s cubic-bezier(0.22, 1, 0.36, 1),
                background 0.4s ease, border-color 0.4s ease;
    pointer-events: none;
  }
  .stack.open .card { opacity: 1; pointer-events: auto; }
  .stack.open .card:nth-child(1) { transform: translate(-116px, -12px) rotate(-5deg); transition-delay: 0s; }
  .stack.open .card:nth-child(2) { transform: translate(0, -34px) rotate(0deg); transition-delay: .05s; z-index: 2; }
  .stack.open .card:nth-child(3) { transform: translate(116px, -12px) rotate(5deg); transition-delay: .1s; }
  .stack .card:hover { border-color: var(--blue); }
  .stack .card .card-emoji { font-size: 20px; margin-bottom: 6px; }
  .stack .card .card-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .stack .card .card-sub { font-size: 11px; color: var(--gray); margin-top: 2px; line-height: 1.35; }

  /* ---------- Doc modal (Notes-style window) ---------- */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 150;
    background: rgba(0, 0, 0, 0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: auto; }
  .doc-window {
    position: fixed;
    top: 50%; left: 50%;
    z-index: 160;
    width: min(460px, calc(100vw - 40px));
    background: var(--glass-strong);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 40px 100px rgba(0, 0, 0, 0.55);
    opacity: 0;
    transform: translate(-50%, -46%) scale(0.96);
    pointer-events: none;
    transition: opacity .25s ease, transform .25s cubic-bezier(0.22, 1, 0.36, 1),
                background 0.4s ease, border-color 0.4s ease;
    overflow: hidden;
  }
  .doc-window.open {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: auto;
  }
  .doc-titlebar {
    display: flex;
    align-items: center;
    height: 40px;
    padding: 0 14px;
    background: var(--row-bg);
    border-bottom: 1px solid var(--border);
    position: relative;
    transition: background 0.4s ease, border-color 0.4s ease;
  }
  .traffic { display: flex; gap: 8px; }
  .traffic button {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 0;
    padding: 0;
    transition: filter .15s ease;
  }
  .traffic button:hover { filter: brightness(1.25); }
  .traffic .red { background: #FF5F57; }
  .traffic .yellow { background: #FEBC2E; }
  .traffic .green { background: #28C840; }
  .doc-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    font-weight: 600;
    color: var(--gray);
    white-space: nowrap;
    max-width: 70%;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .doc-body { padding: 22px 26px 24px; }

  var lang = "en";

  }

    toggleLangMenu(false);
  });

  /* ================= Theme ================= */
  var THEME_KEY = "mj-theme";
  var themeToggle = document.getElementById("themeToggle");

  function autoTheme() {
    var h = new Date().getHours();
    return (h >= 6 && h < 20) ? "light" : "dark";
  }
  function applyTheme(t) {
    document.documentElement.setAttribute("data-theme", t);
    themeToggle.textContent = t === "light" ? "☀️" : "🌙";
  }
  var storedTheme = null;
  try { storedTheme = localStorage.getItem(THEME_KEY); } catch (e) {}
  applyTheme(storedTheme === "light" || storedTheme === "dark" ? storedTheme : autoTheme());

  themeToggle.addEventListener("click", function () {
    var next = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
    applyTheme(next);
    try { localStorage.setItem(THEME_KEY, next); } catch (e) {}

  // Follow the clock unless the user chose manually

  /* ================= Trail canvas ================= */

  var ctx = canvas.getContext("2d");
  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + "px";
    canvas.style.height = innerHeight + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

  resize();
  window.addEventListener("resize", resize);

  var prev = null;
  var prevMid = null;
  var totalPx = 0;
  var moved = false;

  var PX_TO_M = 0.000264583; // ~96 dpi

  function trailRGB() {
    return document.documentElement.getAttribute("data-theme") === "light" ? "0, 64, 255" : "74, 126, 255";
  }

  function drawSegment(x, y) {
    var now = performance.now();
    if (!prev) {
      prev = { x: x, y: y, t: now };
      prevMid = { x: x, y: y };
      return;
    }
    var dx = x - prev.x, dy = y - prev.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1) return;

    var dt = Math.max(now - prev.t, 1);
    var speed = dist / dt;
    totalPx += dist;

    var w = Math.min(1.2 + speed * 3.2, 9);
    var a = Math.min(0.18 + speed * 0.5, 0.95);
    var rgb = trailRGB();
    var mid = { x: (prev.x + x) / 2, y: (prev.y + y) / 2 };

    ctx.strokeStyle = "rgba(" + rgb + ", " + (a * 0.28).toFixed(3) + ")";
    ctx.lineWidth = w * 2.6;
    ctx.beginPath();
    ctx.moveTo(prevMid.x, prevMid.y);
    ctx.quadraticCurveTo(prev.x, prev.y, mid.x, mid.y);
    ctx.stroke();

    ctx.strokeStyle = "rgba(" + rgb + ", " + a.toFixed(3) + ")";
    ctx.lineWidth = w;
    ctx.beginPath();
    ctx.moveTo(prevMid.x, prevMid.y);
    ctx.quadraticCurveTo(prev.x, prev.y, mid.x, mid.y);
    ctx.stroke();

    prev = { x: x, y: y, t: now };
    prevMid = mid;

    if (!moved) {
      moved = true;
      widget.classList.add("visible");
    }
    updateHud();
  }

  function fadeLoop() {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.globalCompositeOperation = "destination-out";
    ctx.fillStyle = "rgba(0, 0, 0, 0.04)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
    requestAnimationFrame(fadeLoop);
  }
  requestAnimationFrame(fadeLoop);

  var HOVERABLE = "a, button, .dock-item, .switch, .segmented button, .traffic button, .card, .widget";

  document.addEventListener("mouseover", function (e) {
    cursorEl.classList.toggle("hover", !!e.target.closest(HOVERABLE));

  var widget = document.getElementById("widget");
  var hudScore = document.getElementById("hudScore");

  function updateHud() {

    hudScore.textContent = Math.round(totalPx / 10).toLocaleString(lang === "ua" ? "uk-UA" : "en-US");

  }
  function moveDrag(x, y) {
    if (!drag) return;

    widget.style.left = nx + "px";
    widget.style.top = ny + "px";
  }

    drag = null;

  var mjMenuIcon = document.getElementById("mjMenuIcon");

  function armIdle() {
    clearTimeout(idleTimer);
    if (document.body.classList.contains("idle")) {
      document.body.classList.remove("idle");

    }
    idleTimer = setTimeout(function () {
      document.body.classList.add("idle");
      mjMenuIcon.classList.add("pulse");
    }, IDLE_MS);
  }
  armIdle();

  /* ================= Pointer handling ================= */
  function onMove(x, y) {
    cursorEl.classList.add("on");
    cursorEl.style.transform = "translate(" + (x - 4) + "px, " + (y - 4) + "px)";
    if (drag) {
      moveDrag(x, y);
    } else {
      drawSegment(x, y);
    }
    armIdle();
  }
  document.addEventListener("mousemove", function (e) { onMove(e.clientX, e.clientY); });
  document.addEventListener("touchmove", function (e) {
    var t = e.touches[0];
    if (t) onMove(t.clientX, t.clientY);
  }, { passive: true });
  document.addEventListener("touchstart", function (e) {
    var t = e.touches[0];
    if (t) { prev = null; onMove(t.clientX, t.clientY); }
  }, { passive: true });
  document.addEventListener("mouseleave", function () { prev = null; });

  /* ================= Popover ================= */
  var popover = document.getElementById("popover");
  var dockMj = document.getElementById("dockMj");

  function togglePopover(force) {
    var open = force !== undefined ? force : !popover.classList.contains("open");
    popover.classList.toggle("open", open);
    mjMenuIcon.classList.toggle("open", open);
  }
  mjMenuIcon.addEventListener("click", function (e) { e.stopPropagation(); togglePopover(); });
  dockMj.addEventListener("click", function (e) { e.stopPropagation(); togglePopover(); });

  /* ---- Toggle switch + status ---- */
  var mjActive = false;
  var mjSwitch = document.getElementById("mjSwitch");
  var statusDot = document.getElementById("statusDot");
  var statusText = document.getElementById("statusText");
  var jiggles = 0;
  var jiggleInterval = 30;
  var jiggleTimer = null;

  function setActive(on) {
    mjActive = on;
    mjSwitch.classList.toggle("on", on);
    mjSwitch.setAttribute("aria-checked", on ? "true" : "false");
    statusDot.classList.toggle("on", on);
    statusText.textContent = on ? I18N[lang].statusActive : I18N[lang].statusInactive;
    dockMj.classList.toggle("running", on);
    scheduleJiggle();
  }
  function scheduleJiggle() {
    clearInterval(jiggleTimer);
    if (!mjActive) return;
    jiggleTimer = setInterval(function () {
      jiggles++;
      statJiggles.textContent = jiggles;
    }, jiggleInterval * 1000);
  }
  mjSwitch.addEventListener("click", function () { setActive(!mjActive); });

  var intervalCtl = document.getElementById("intervalCtl");
  intervalCtl.addEventListener("click", function (e) {
    var btn = e.target.closest("button");
    if (!btn) return;
    intervalCtl.querySelectorAll("button").forEach(function (b) { b.classList.remove("active"); });
    btn.classList.add("active");
    jiggleInterval = parseInt(btn.getAttribute("data-sec"), 10);
    scheduleJiggle();
  });

  var statSession = document.getElementById("statSession");
  var statJiggles = document.getElementById("statJiggles");
  var statDistance = document.getElementById("statDistance");
  var sessionStart = Date.now();

  setInterval(function () {
    var s = Math.floor((Date.now() - sessionStart) / 1000);
    var m = Math.floor(s / 60);
    statSession.textContent = m + ":" + String(s % 60).padStart(2, "0");
  }, 1000);

  /* ================= Folder stack ================= */
  var stack = document.getElementById("stack");
  var dockFolder = document.getElementById("dockFolder");

  function toggleStack(force) {
    var open = force !== undefined ? force : !stack.classList.contains("open");
    stack.classList.toggle("open", open);
    dockFolder.classList.toggle("running", open);
  }
  dockFolder.addEventListener("click", function (e) { e.stopPropagation(); toggleStack(); });

  /* ================= Doc modal ================= */
  var docWindow = document.getElementById("docWindow");
  var modalBackdrop = document.getElementById("modalBackdrop");
  var docTitle = document.getElementById("docTitle");
  var docContent = document.getElementById("docContent");
  var dockNotes = document.getElementById("dockNotes");

  function renderDoc(key) {
    var doc = DOCS[lang][key];
    docTitle.textContent = doc.title;
    docContent.innerHTML = doc.html;
  }
  function openDoc(key) {
    currentDoc = key;
    renderDoc(key);
    docWindow.classList.add("open");
    modalBackdrop.classList.add("open");
    dockNotes.classList.toggle("running", key === "readme");
  }
  function closeDoc() {
    currentDoc = null;
    docWindow.classList.remove("open");
    modalBackdrop.classList.remove("open");
    dockNotes.classList.remove("running");
  }
  dockNotes.addEventListener("click", function (e) { e.stopPropagation(); openDoc("readme"); });
  document.getElementById("docClose").addEventListener("click", closeDoc);
  modalBackdrop.addEventListener("click", closeDoc);

  stack.addEventListener("click", function (e) {
    var card = e.target.closest(".card");
    if (!card) return;
    e.stopPropagation();
    toggleStack(false);
    openDoc(card.getAttribute("data-doc"));
  });

  /* ================= Dock: GitHub ================= */
  document.getElementById("dockGithub").addEventListener("click", function () {
    window.open("https://github.com/dmirtyisme/mick-jigger", "_blank", "noopener");
  });

  /* ================= Outside clicks & keyboard ================= */
  document.addEventListener("click", function (e) {
    if (!popover.contains(e.target)) togglePopover(false);
    if (!langMenu.contains(e.target) && e.target !== langBtn) toggleLangMenu(false);
    if (!stack.contains(e.target)) toggleStack(false);
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      togglePopover(false);
      toggleLangMenu(false);
      toggleStack(false);
      closeDoc();
    }
    armIdle();
  });

  applyLang();
})();
</script>
</body>
</html>
